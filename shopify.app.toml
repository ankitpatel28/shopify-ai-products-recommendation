# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "a20d5d4fc12a1e101b590c309122c02d"
name = "cross-browser-cart-support"
application_url = "https://surrey-revised-petition-longest.trycloudflare.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-01"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "carts/update" ]
  uri = "/webhooks/carts/update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,unauthenticated_read_product_listings,read_orders,write_app_proxy,read_cart_transforms,write_cart_transforms,read_customers,write_customers,unauthenticated_read_checkouts,unauthenticated_write_checkouts,unauthenticated_read_customers,unauthenticated_write_customers,customer_read_customers,customer_write_customers,read_metaobject_definitions,write_metaobject_definitions,read_metaobjects,write_metaobjects"

[auth]
redirect_urls = [ "https://surrey-revised-petition-longest.trycloudflare.com/auth/callback", "https://surrey-revised-petition-longest.trycloudflare.com/auth/shopify/callback", "https://surrey-revised-petition-longest.trycloudflare.com/api/auth/callback" ]

[app_proxy]
subpath = "customer-cart"
prefix = "apps"
url = "https://surrey-revised-petition-longest.trycloudflare.com/shopify/customer-cart"
